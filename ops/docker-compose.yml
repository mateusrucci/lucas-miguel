services:
  lucas-miguel-nginx:
    image: nginx:1.27-alpine
    container_name: lucas-miguel-nginx
    restart: unless-stopped
    depends_on:
      - lucas-miguel-php
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.lucas-miguel.entrypoints=web,websecure
      - traefik.http.routers.lucas-miguel.rule=Host(`lp.liberdadeoperacional.com.br`)
      - traefik.http.routers.lucas-miguel.tls=true
      - traefik.http.routers.lucas-miguel.tls.certresolver=mytlschallenge
      - traefik.http.services.lucas-miguel.loadbalancer.server.port=80

  lucas-miguel-php:
    build:
      context: .
      dockerfile: php.Dockerfile
    container_name: lucas-miguel-php
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro

networks:
  traefik:
    external: true
    name: n8n_default
