name: Deploy -> VPS Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'Sites/**'
      - 'ops/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps-hostinger
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync -> VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DEPLOY_PATH: ${{ secrets.VPS_PATH }}
      PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
      VPS_PORT: ${{ secrets.VPS_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync app files
        run: |
          SSH_PORT="${VPS_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/lucas-miguel}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '$DEPLOY_PATH/html'"

          rsync -az --delete \
            --exclude='.DS_Store' \
            --exclude='*.swp' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            ./Sites/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$DEPLOY_PATH/html/"

          rsync -az \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            ./ops/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$DEPLOY_PATH/"

      - name: Restart stack
        run: |
          SSH_PORT="${VPS_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/lucas-miguel}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd '$DEPLOY_PATH' && docker compose up -d --build"

      - name: Validate deploy
        run: |
          PUBLIC_URL="${PUBLIC_URL:-https://lp.liberdadeoperacional.com.br/cidades/indaiatuba/}"
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PUBLIC_URL?v=${{ github.run_id }}" --max-time 20)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deploy validation failed: $PUBLIC_URL returned HTTP $STATUS"
            exit 1
          fi
          echo "Deploy OK"
